<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodPicker — aperçu icônes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Hanken+Grotesk:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hanken Grotesk', sans-serif;
    background: #FBFCF7;
    color: #1A2E1D;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 20px;
  }
  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: 18px;
    color: #235236;
    text-align: center;
  }
  .label-top {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(26,46,29,0.4);
    text-align: center;
    margin-bottom: 8px;
  }

  /* ── Variante A : chips horizontaux ── */
  .section { width: 100%; max-width: 420px; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(26,46,29,0.35);
    margin-bottom: 14px;
    text-align: center;
  }

  .picker-row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .mood-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 10px 12px;
    border-radius: 16px;
    border: 1.5px solid rgba(35,82,54,0.14);
    background: #fff;
    cursor: pointer;
    transition: all 0.18s ease;
    flex: 1;
    min-width: 0;
  }
  .mood-chip:hover {
    border-color: #3E8E4F;
    background: #F3F5EE;
  }
  .mood-chip.selected {
    border-color: #3E8E4F;
    background: rgba(62,142,79,0.08);
    box-shadow: 0 2px 12px rgba(62,142,79,0.12);
  }
  .mood-chip svg {
    width: 28px;
    height: 28px;
    stroke: #235236;
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.18s;
  }
  .mood-chip.selected svg { stroke: #3E8E4F; }
  .mood-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(26,46,29,0.55);
    text-align: center;
    white-space: nowrap;
    transition: color 0.18s;
  }
  .mood-chip.selected .mood-label { color: #235236; }

  /* Retour doux après sélection */
  .ack {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: #3E8E4F;
    font-weight: 500;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .ack.visible { opacity: 1; }

  /* ── Variante B : chips avec fond coloré sur sélection ── */
  .picker-row-b .mood-chip.selected {
    border-color: #235236;
    background: #235236;
  }
  .picker-row-b .mood-chip.selected svg { stroke: #FBFCF7; }
  .picker-row-b .mood-chip.selected .mood-label { color: rgba(251,252,247,0.85); }

  hr {
    border: none;
    border-top: 1px solid rgba(35,82,54,0.10);
    width: 100%;
    max-width: 420px;
  }
</style>
</head>
<body>

<h1>Comment tu te sens aujourd'hui ?</h1>

<!-- Variante A : contour vert sur sélection -->
<div class="section">
  <div class="section-title">Variante A — contour vert</div>
  <div class="picker-row" id="rowA">

    <div class="mood-chip" data-score="1" data-group="A">
      <!-- Nuage / vaseux -->
      <svg viewBox="0 0 28 28">
        <path d="M7 18a4 4 0 0 1 .3-7.9A6 6 0 0 1 19 13h.5a3.5 3.5 0 0 1 0 7H7z"/>
        <line x1="10" y1="22" x2="10" y2="24"/>
        <line x1="14" y1="22" x2="14" y2="25"/>
        <line x1="18" y1="22" x2="18" y2="23"/>
      </svg>
      <span class="mood-label">Vaseux</span>
    </div>

    <div class="mood-chip" data-score="2" data-group="A">
      <!-- Cercle neutre / ça va -->
      <svg viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="9"/>
        <line x1="10" y1="17" x2="18" y2="17"/>
        <circle cx="11" cy="12" r="1" fill="#235236" stroke="none"/>
        <circle cx="17" cy="12" r="1" fill="#235236" stroke="none"/>
      </svg>
      <span class="mood-label">Ça va</span>
    </div>

    <div class="mood-chip" data-score="3" data-group="A">
      <!-- Feuille / léger -->
      <svg viewBox="0 0 28 28">
        <path d="M7 21 C7 21 8 10 20 7 C20 7 19 18 7 21z"/>
        <line x1="7" y1="21" x2="14" y2="14"/>
      </svg>
      <span class="mood-label">Léger</span>
    </div>

    <div class="mood-chip" data-score="4" data-group="A">
      <!-- Soleil rayonnant / plein d'énergie -->
      <svg viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="5"/>
        <line x1="14" y1="4" x2="14" y2="7"/>
        <line x1="14" y1="21" x2="14" y2="24"/>
        <line x1="4" y1="14" x2="7" y2="14"/>
        <line x1="21" y1="14" x2="24" y2="14"/>
        <line x1="7.5" y1="7.5" x2="9.5" y2="9.5"/>
        <line x1="18.5" y1="18.5" x2="20.5" y2="20.5"/>
        <line x1="20.5" y1="7.5" x2="18.5" y2="9.5"/>
        <line x1="9.5" y1="18.5" x2="7.5" y2="20.5"/>
      </svg>
      <span class="mood-label">Plein d'énergie</span>
    </div>

  </div>
  <div class="ack" id="ackA"></div>
</div>

<hr>

<!-- Variante B : fond forêt foncé sur sélection -->
<div class="section">
  <div class="section-title">Variante B — fond forêt sur sélection</div>
  <div class="picker-row picker-row-b" id="rowB">

    <div class="mood-chip" data-score="1" data-group="B">
      <svg viewBox="0 0 28 28">
        <path d="M7 18a4 4 0 0 1 .3-7.9A6 6 0 0 1 19 13h.5a3.5 3.5 0 0 1 0 7H7z"/>
        <line x1="10" y1="22" x2="10" y2="24"/>
        <line x1="14" y1="22" x2="14" y2="25"/>
        <line x1="18" y1="22" x2="18" y2="23"/>
      </svg>
      <span class="mood-label">Vaseux</span>
    </div>

    <div class="mood-chip" data-score="2" data-group="B">
      <svg viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="9"/>
        <line x1="10" y1="17" x2="18" y2="17"/>
        <circle cx="11" cy="12" r="1" fill="#235236" stroke="none"/>
        <circle cx="17" cy="12" r="1" fill="#235236" stroke="none"/>
      </svg>
      <span class="mood-label">Ça va</span>
    </div>

    <div class="mood-chip" data-score="3" data-group="B">
      <svg viewBox="0 0 28 28">
        <path d="M7 21 C7 21 8 10 20 7 C20 7 19 18 7 21z"/>
        <line x1="7" y1="21" x2="14" y2="14"/>
      </svg>
      <span class="mood-label">Léger</span>
    </div>

    <div class="mood-chip" data-score="4" data-group="B">
      <svg viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="5"/>
        <line x1="14" y1="4" x2="14" y2="7"/>
        <line x1="14" y1="21" x2="14" y2="24"/>
        <line x1="4" y1="14" x2="7" y2="14"/>
        <line x1="21" y1="14" x2="24" y2="14"/>
        <line x1="7.5" y1="7.5" x2="9.5" y2="9.5"/>
        <line x1="18.5" y1="18.5" x2="20.5" y2="20.5"/>
        <line x1="20.5" y1="7.5" x2="18.5" y2="9.5"/>
        <line x1="9.5" y1="18.5" x2="7.5" y2="20.5"/>
      </svg>
      <span class="mood-label">Plein d'énergie</span>
    </div>

  </div>
  <div class="ack" id="ackB"></div>
</div>

<script>
  const ACK = {
    1: "Merci de l'avoir partagé. Prends soin de toi aujourd'hui.",
    2: "Noté. Le rythme se pose jour après jour.",
    3: "C'est une belle sensation. Le corps avance bien.",
    4: "Super ! Profite de cette énergie."
  }
  document.querySelectorAll('.mood-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const group = chip.dataset.group
      const score = chip.dataset.score
      document.querySelectorAll(`[data-group="${group}"]`).forEach(c => c.classList.remove('selected'))
      chip.classList.add('selected')
      const ack = document.getElementById(`ack${group}`)
      ack.textContent = ACK[score]
      ack.classList.add('visible')

      // Fix les petits points qui deviennent blancs sur variante B
      if (group === 'B') {
        document.querySelectorAll(`[data-group="B"] circle[fill="#235236"]`).forEach(c => {
          c.setAttribute('fill', '#235236')
        })
        const selectedDots = chip.querySelectorAll('circle[fill="#235236"]')
        selectedDots.forEach(d => d.setAttribute('fill', '#FBFCF7'))
      }
    })
  })
</script>
</body>
</html>
