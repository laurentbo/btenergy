<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTENERGY — Preview Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens — production (globals.css) ── */
:root {
  --bg:         #15130E;
  --bg-lift:    #1C1A14;
  --bg-surface: #211E17;
  --bg-elev:    #27241C;
  --line:       rgba(247,234,205,0.07);
  --line-soft:  rgba(247,234,205,0.04);
  --text:       #ECE4D2;
  --text-dim:   rgba(236,228,210,0.62);
  --text-mute:  rgba(236,228,210,0.34);
  --text-faint: rgba(236,228,210,0.18);
  --coach:      #A8BBA5;
  --brand:      #5CB551;
  --brand-soft: rgba(92,181,81,0.14);
  --sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --serif: 'Instrument Serif','Iowan Old Style',Georgia,serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.site-header{background:var(--bg-lift);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:100;padding:0 24px}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:32px;height:52px}
.logo{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--text);white-space:nowrap}
.logo span{color:var(--text-mute)}
.tabs{display:flex;gap:2px;flex:1}
.tab{padding:6px 14px;border-radius:8px;border:none;background:none;font-family:var(--sans);font-size:12.5px;color:var(--text-mute);cursor:pointer;transition:all .15s}
.tab:hover{background:var(--bg-surface);color:var(--text-dim)}
.tab.active{background:var(--bg-surface);color:var(--text)}

/* ── LAYOUT ── */
.main{max-width:1100px;margin:0 auto;padding:32px 24px}
.section{display:none}
.section.active{display:block}

/* ── WEEK HEADER ── */
.week-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;margin-top:40px}
.week-header:first-child{margin-top:0}
.week-badge{padding:3px 12px;border-radius:999px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#fff;font-weight:600}
.week-title{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--text)}
.week-desc{font-size:12.5px;color:var(--text-mute);margin-top:2px}

/* ── DAY GRID ── */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:8px}

/* ── DAY CARD ── */
.day-card{background:var(--bg-lift);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.day-card:hover{border-color:rgba(247,234,205,0.14)}
.day-card.expanded{border-color:rgba(92,181,81,0.2)}
.day-head{padding:14px 16px;display:flex;align-items:center;gap:12px}
.day-num{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--text-mute);width:38px;flex-shrink:0;line-height:1}
.day-theme{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:3px}
.day-intention{font-size:12.5px;color:var(--text-dim);line-height:1.45}
.day-body{display:none;padding:0 16px 16px;border-top:1px solid var(--line)}
.day-card.expanded .day-body{display:block}

.coach-word{border-left:2px solid rgba(168,187,165,0.3);padding:8px 12px;margin:12px 0;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--coach);line-height:1.55}

.meal-list{margin:12px 0}
.meal-row{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.meal-row:last-child{border-bottom:none}
.meal-moment{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--text-mute);min-width:72px;flex-shrink:0;padding-top:1px}
.meal-items{font-size:12.5px;color:var(--text-dim);line-height:1.55}
.meal-conseil{font-size:11.5px;color:var(--text-faint);margin-top:3px}

.day-footer{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.foot-block{background:var(--bg-surface);border-radius:8px;padding:10px 12px}
.foot-label{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px}
.foot-val{font-size:12px;color:var(--text-dim);line-height:1.5}

/* ── PROGRAM NEW ── */
.pnew-title{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--text);margin-bottom:6px}
.pnew-sub{font-size:13px;color:var(--text-mute);margin-bottom:20px}
.pnew-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.pnew-card{background:var(--bg-lift);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.pnew-head{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.pnew-day{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--text-mute);width:36px;flex-shrink:0}
.pnew-chapter{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500}
.pnew-meals{padding:10px 16px}
.pnew-meal{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line-soft)}
.pnew-meal:last-child{border-bottom:none}
.pnew-time{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--text-mute);min-width:36px;flex-shrink:0}
.pnew-label{font-size:11px;color:var(--text-faint);margin-bottom:2px}
.pnew-items{font-size:12px;color:var(--text-dim);line-height:1.5}
.pnew-alts{font-family:var(--serif);font-style:italic;font-size:11.5px;color:var(--coach);margin-top:3px}
.pnew-note{font-size:11px;color:rgba(92,181,81,.7);margin-top:3px}

/* ── PRINCIPES ── */
.principles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:20px}
.principle-card{background:var(--bg-lift);border:1px solid var(--line);border-radius:10px;padding:18px 20px}
.principle-n{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--line);line-height:1;margin-bottom:8px}
.principle-title{font-size:14px;font-weight:500;color:rgb(210,236,212);margin-bottom:6px}
.principle-body{font-size:12.5px;color:var(--text-dim);line-height:1.65}

/* ── EMAILS ── */
.email-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.epick{padding:6px 14px;border-radius:999px;border:1px solid var(--line);background:var(--bg-lift);font-family:var(--sans);font-size:12.5px;color:var(--text-mute);cursor:pointer;transition:all .15s}
.epick:hover{border-color:rgba(247,234,205,0.14);color:var(--text-dim)}
.epick.active{background:var(--bg-surface);color:var(--text);border-color:rgba(247,234,205,0.14)}

.email-frame{background:#EEE7D6;border-radius:12px;padding:40px 20px;overflow:auto}
.email-wrap{max-width:520px;margin:0 auto}

/* email inner (crème — intentionnel, c'est le vrai rendu email) */
.em-card{background:#FBF6E8;border:1px solid #E2D9C0;border-radius:14px;padding:44px 40px}
.em-eyebrow{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:#A89E88;margin-bottom:6px}
.em-h1{font-family:var(--serif);font-size:28px;line-height:1.2;color:#2A2520;letter-spacing:-.015em;margin-bottom:26px}
.em-h1 em{font-style:italic;color:#7B8A78}
.em-p{font-size:15.5px;line-height:1.75;color:#3D362D;margin-bottom:16px}
.em-p-sm{font-size:14px;line-height:1.7;color:#6A6157;margin-bottom:32px}
.em-section-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#A89E88;font-weight:500;margin-bottom:12px}
.em-table{width:100%;border-collapse:collapse;margin-bottom:28px}
.em-row td{padding:9px 0;border-top:1px solid #EAE2CB;font-size:14px;color:#3D362D}
.em-italic{font-family:var(--serif);font-style:italic;font-size:14px;color:#A89E88;display:inline-block;width:80px}
.em-chapter-block{padding:9px 0;border-top:1px solid #EAE2CB}
.em-chapter-name{font-family:var(--serif);font-style:italic;font-size:16px;color:#7B8A78}
.em-chapter-days{font-size:12.5px;color:#8A7E68;margin-left:4px}
.em-chapter-desc{font-size:13.5px;color:#4A4138;line-height:1.6;margin-top:3px}
.em-cta{display:inline-block;padding:13px 26px;background:#2A2520;border-radius:999px;color:#F5EFE2;text-decoration:none;font-size:14px;letter-spacing:.01em;margin-bottom:32px}
.em-sig{font-family:var(--serif);font-style:italic;font-size:17px;color:#7B8A78;margin-bottom:6px}
.em-sig-sub{font-size:12.5px;color:#8A7E68}
.em-footer{padding:20px 0 0;font-size:11px;color:#A89E88;line-height:1.7}
.em-meal-table{width:100%;border-collapse:collapse;margin-bottom:30px}
.em-meal-time{padding:11px 0;border-bottom:1px solid #EAE2CB;width:50px;vertical-align:top;font-family:var(--serif);font-style:italic;font-size:14px;color:#A89E88}
.em-meal-content{padding:11px 0;border-bottom:1px solid #EAE2CB}
.em-meal-name{font-size:14.5px;color:#2A2520;margin-bottom:3px}
.em-meal-detail{font-size:13px;color:#6A6157;line-height:1.55}

/* ── PARCOURS ── */
.journey-section-head{display:flex;align-items:center;gap:12px;margin:36px 0 14px}
.journey-section-head:first-child{margin-top:0}
.journey-phase-badge{padding:3px 12px;border-radius:999px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#fff;font-weight:600}
.journey-phase-title{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--text)}

.journey-timeline{padding-left:28px;position:relative;margin-bottom:4px}
.journey-timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--line)}

.journey-step{position:relative;margin-bottom:12px}
.journey-step::before{content:'';position:absolute;left:-24px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--bg-surface);border:1px solid var(--line)}
.journey-step.detox::before{border-color:#5CB551}
.journey-step.energie::before{border-color:#A8BBA5}
.journey-step.ancrage::before{border-color:#BF7D2C}
.journey-step.prep::before{border-color:#f59e0b}
.journey-step.post::before{border-color:rgba(168,187,165,.4)}

.step-card{background:var(--bg-lift);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
.step-tag{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px}
.step-title{font-family:var(--serif);font-style:italic;font-size:17px;color:var(--text);margin-bottom:5px}
.step-body{font-size:12.5px;color:var(--text-dim);line-height:1.6}
.step-actions{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.step-action{background:var(--bg-surface);border-radius:6px;padding:4px 10px;font-size:11.5px;color:var(--text-mute)}
.step-warn{margin-top:10px;padding:10px 12px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;font-size:12px;color:rgba(245,200,90,.8);line-height:1.6}
.step-coach{margin-top:10px;border-left:2px solid rgba(168,187,165,0.25);padding:6px 12px;font-family:var(--serif);font-style:italic;font-size:13px;color:var(--coach);line-height:1.55}

/* ── EYEBROW ── */
.eyebrow{font-size:10px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--text-mute)}
</style>
</head>
<body>

      <button class="tab active" onclick="showTab('programme',this)">Programme 21j (v1)</button>
      <button class="tab" onclick="showTab('programme-new',this)">Programme V2</button>
      <button class="tab" onclick="showTab('emails',this)">Emails</button>
      <button class="tab" onclick="showTab('parcours',this)">Parcours utilisateur</button>
    </nav>
  </div>
</header>

<main class="main">

  <section id="section-programme-new" class="section"><div id="programme-new-root"></div></section>
  <section id="section-emails"        class="section">
    <div class="email-picker" id="email-picker"></div>
    <div class="email-frame"><div class="email-wrap" id="email-content"></div></div>
  </section>
  <section id="section-parcours"      class="section"><div id="parcours-root"></div></section>
</main>

function renderProgramme() {
  const root = document.getElementById('programme-root')
  let html = ''
  ;[1,2,3].forEach(w => {
    const wt   = WEEK_THEMES[w]
    const days = PROGRAM.filter(d => d.week === w)
    html += `<div class="week-header">
      <span class="week-badge" style="background:${wt.color}">${['','Semaine 1','Semaine 2','Semaine 3'][w]}</span>
      <div><div class="week-title">${wt.title}</div><div class="week-desc">${wt.desc}</div></div>
    </div><div class="days-grid">`
    days.forEach(day => {
      const meals = day.meals.map(m => `
        <div class="meal-row">
          <div class="meal-moment">${m.moment}</div>
          <div><div class="meal-items">${m.items.join(' · ')}</div>${m.conseil ? `<div class="meal-conseil">${m.conseil}</div>` : ''}</div>
        </div>`).join('')
      html += `<div class="day-card" id="day-${day.day}" onclick="toggleDay(${day.day})">
        <div class="day-head">
          <div class="day-num">${day.day}</div>
          <div><div class="day-theme">${day.theme}</div><div class="day-intention">${day.intention}</div></div>
        </div>
        <div class="day-body">
          <div class="coach-word">${day.coachWord}</div>
          <div class="meal-list">${meals}</div>
          <div class="day-footer">
            <div class="foot-block"><div class="foot-label">💧 Hydratation</div><div class="foot-val">${day.hydration}</div></div>
            <div class="foot-block"><div class="foot-label">💡 Astuce</div><div class="foot-val">${day.tip}</div></div>
          </div>
        </div>
      </div>`
    })
    html += `</div>`
  })
  root.innerHTML = html
}

function toggleDay(n) {
  document.getElementById('day-'+n).classList.toggle('expanded')
}

    <div class="journey-timeline">
      <div class="journey-step post"><div class="step-card">
        <div class="step-tag">J22+</div><div class="step-title">Sortie progressive</div>
        <div class="step-body">Garder les rituels fondamentaux : eau citronnée, crudités, fenêtre nocturne 12h, 30 min mouvement.</div>
        <div class="step-actions">
          <span class="step-action">Eau tiède + citron</span><span class="step-action">Fruits seuls entre repas</span>
          <span class="step-action">Dîner avant 20h</span><span class="step-action">Jeûne nocturne 12h</span>
        </div>
      </div></div>
    </div>

    <div style="margin-top:40px">
      <div class="journey-section-head">
        <span class="journey-phase-badge" style="background:var(--bg-elev);border:1px solid var(--line);color:var(--text-dim)">Méthode</span>
        <span class="journey-phase-title">7 Principes Verissimo</span>
      </div>
      <div class="principles-grid">
        ${PRINCIPLES_V2.map(p => `<div class="principle-card">
          <div class="principle-n">${p.n}</div>
          <div class="principle-title">${p.title}</div>
          <div class="principle-body">${p.body}</div>
        </div>`).join('')}
      </div>
    </div>`
}

function showTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('section-'+name).classList.add('active')
  btn.classList.add('active')
}
